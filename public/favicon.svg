<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0a0e14" rx="4"/>

  <!-- Targeting reticle — outer circle -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- Crosshair lines — gaps at centre for classic reticle look -->
  <!-- Top -->
  <line x1="16" y1="3"  x2="16" y2="10" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Bottom -->
  <line x1="16" y1="22" x2="16" y2="29" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Left -->
  <line x1="3"  y1="16" x2="10" y2="16" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Right -->
  <line x1="22" y1="16" x2="29" y2="16" stroke="#4fc3f7" stroke-width="1.5"/>

  <!-- Centre dot -->
  <circle cx="16" cy="16" r="1.5" fill="#4fc3f7"/>
</svg>
