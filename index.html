<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary metadata -->
    <title>BATTLESHIP — Browser Naval Combat</title>
    <meta name="description"
          content="Challenge the AI or a friend in this browser-based naval strategy game. Four difficulty tiers. No install required." />
    <meta name="author" content="Demond Allen Counce" />

    <!-- Open Graph (Facebook, Discord, Slack, iMessage) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://battleshiproj.netlify.app" />
    <meta property="og:title"       content="BATTLESHIP — Browser Naval Combat" />
    <meta property="og:description" content="Command your fleet. Destroy theirs. A military-terminal Battleship game with four AI difficulty tiers and local two-player hot-seat mode." />
    <meta property="og:image"       content="https://battleshiproj.netlify.app/og-image.svg" />
    <meta property="og:image:alt"   content="Battleship game logo — dark terminal interface with a naval grid" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="BATTLESHIP — Browser Naval Combat" />
    <meta name="twitter:description" content="Command your fleet. Destroy theirs. A military-terminal Battleship game with four AI difficulty tiers and local two-player hot-seat mode." />
    <meta name="twitter:image"       content="https://battleshiproj.netlify.app/og-image.svg" />
    <meta name="twitter:image:alt"   content="Battleship game logo — dark terminal interface with a naval grid" />

    <!-- Theme colour — matches the game's dark background -->
    <meta name="theme-color" content="#0a0e14" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
